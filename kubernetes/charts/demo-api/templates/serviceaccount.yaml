{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "demo-api.serviceAccountName" . }}
  labels:
    {{- include "demo-api.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# Default off: demo-api makes no Kubernetes API calls, so it should not carry a
# mountable token. Per-pod mounting is also disabled in the Deployment.
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}

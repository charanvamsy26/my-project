# Constraint: disallow mutable image tags (:latest / untagged) on Pods.
# enforcementAction: deny  (mutable images break reproducibility & rollbacks)
#
# demo-api is deployed as ghcr.io/charanvamsy26/demo-api:<tag> with an explicit
# version tag (the Helm chart pins .Values.image.tag to the chart appVersion / a
# git SHA), so it complies. Matching on Pod catches Deployments, Jobs, CronJobs,
# bare Pods — everything that produces containers.
apiVersion: constraints.gatekeeper.sh/v1beta1
kind: K8sDisallowLatestTag
metadata:
  name: disallow-latest-tag
  labels:
    app.kubernetes.io/part-of: eks-gitops-platform
    app.kubernetes.io/component: policy
spec:
  enforcementAction: deny
  match:
    kinds:
      - apiGroups: [""]
        kinds: ["Pod"]
    excludedNamespaces:
      - kube-system
      - gatekeeper-system
      - monitoring          # upstream kube-prometheus-stack images are pinned by the chart
      - kube-node-lease
      - kube-public
  parameters:
    # No standing exemptions; add narrow, reviewed entries here only with a ticket.
    exemptImages: []

{{- /*
Render a Secret for DATABASE_URL only when an inline value is supplied AND no
existing Secret is referenced. In real environments prefer
databaseUrlExistingSecret (e.g. populated by External Secrets / SOPS / IRSA)
over inlining the DSN into Helm values.
*/ -}}
{{- if and .Values.databaseUrl (not .Values.databaseUrlExistingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "demo-api.fullname" . }}-db
  labels:
    {{- include "demo-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.databaseUrl | quote }}
{{- end }}

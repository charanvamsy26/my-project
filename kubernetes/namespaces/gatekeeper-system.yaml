apiVersion: v1
kind: Namespace
metadata:
  name: gatekeeper-system
  labels:
    app.kubernetes.io/part-of: eks-gitops-platform
    project: eks-gitops-platform
    managed-by: argocd
    environment: dev
    # OPA Gatekeeper's own controllers run here. To prevent Gatekeeper from
    # blocking or deadlocking itself, this namespace is exempt from its
    # admission webhook. The label below is the conventional opt-out consumed by
    # the Gatekeeper config's exemptNamespaces / namespace selector.
    admission.gatekeeper.sh/ignore: "true"
    # Gatekeeper components may need elevated permissions; keep PSA permissive
    # here and treat this as a trusted platform namespace.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/warn: baseline

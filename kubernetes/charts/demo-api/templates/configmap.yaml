apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "demo-api.fullname" . }}
  labels:
    {{- include "demo-api.labels" . | nindent 4 }}
data:
  # Non-secret app configuration, consumed via envFrom in the Deployment.
  # Secrets (e.g. DATABASE_URL) are NOT here -- they come from a Secret.
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}

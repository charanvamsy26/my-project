# Dedicated ServiceAccount for the controller. Its (very small) RBAC is granted
# in role.yaml + rolebinding.yaml. The token IS mounted here (unlike demo-api's
# SA) because this workload legitimately calls the Kubernetes API to restart the
# deployment.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auto-remediation
  namespace: sre-tools
  labels:
    app.kubernetes.io/name: auto-remediation
    app.kubernetes.io/part-of: eks-gitops-platform
    app.kubernetes.io/component: controller
    app.kubernetes.io/managed-by: kustomize
    project: eks-gitops-platform
# Token is mounted (default) so the controller can authenticate to the API
# server. The least-privilege Role scopes what that token can actually do.
automountServiceAccountToken: true

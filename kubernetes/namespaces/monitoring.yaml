apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/part-of: my-project
    project: my-project
    managed-by: argocd
    environment: dev
    # kube-prometheus-stack components (node-exporter daemonset, etc.) need
    # privileged host access, so the restricted PSA profile would block them.
    # We enforce "privileged" here and rely on Gatekeeper exemptions for this
    # platform namespace. Lock down further if you split exporters out.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: baseline
    pod-security.kubernetes.io/warn: baseline
